<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Condiciones Inseguras</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F0F2F5;color:#1a1a1a;font-size:16px}
.screen{display:none;padding:16px;max-width:520px;margin:0 auto;padding-bottom:60px}
.screen.active{display:block}
.topbar{background:#E65100;color:#fff;padding:13px 16px;text-align:center;position:sticky;top:0;z-index:200}
.topbar h1{font-size:15px;font-weight:700}
.topbar span{font-size:11px;opacity:.75;display:block;margin-top:1px}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid #E8E8E8}
.ct{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
label.fl{font-size:14px;color:#444;font-weight:500;display:block;margin-bottom:5px;margin-top:12px}
label.fl:first-of-type{margin-top:0}
label.fl .req{color:#E24B4A;margin-left:2px}
input[type=text],input[type=date],select,textarea{width:100%;padding:11px 13px;border:1.5px solid #DDD;border-radius:10px;font-size:15px;background:#fff;color:#1a1a1a;outline:none;font-family:inherit;appearance:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:#E65100;box-shadow:0 0 0 3px rgba(230,81,0,.1)}
textarea{min-height:70px;resize:none}
.btn-main{width:100%;padding:15px;background:#E65100;color:#fff;border:none;border-radius:13px;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px}
.btn-main:active{background:#bf4000}
.btn-sec{width:100%;padding:13px;background:#fff;color:#E65100;border:1.5px solid #E65100;border-radius:13px;font-size:15px;font-weight:500;cursor:pointer;margin-top:8px}
.btn-pdf{width:100%;padding:15px;background:#1a6b3a;color:#fff;border:none;border-radius:13px;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px}
.btn-add{width:100%;padding:10px;border:1.5px dashed #E65100;border-radius:10px;background:#FFF3E0;color:#E65100;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px}
.btn-sm{padding:7px 11px;border:1.5px solid #DDD;border-radius:9px;background:#fff;font-size:13px;cursor:pointer;color:#444}
.btn-sm.danger{border-color:#EF5350;color:#EF5350}
.field-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.nota{background:#FFFDE7;border:1px solid #FDD835;border-radius:9px;padding:10px 12px;font-size:13px;color:#555;line-height:1.5;margin-bottom:10px}
.nota.naranja{background:#FFF3E0;border-color:#FFAB76;color:#E65100}
/* CONDICION CARD */
.cond-card{background:#fff;border-radius:13px;padding:14px;margin-bottom:10px;border:1.5px solid #DDD}
.cond-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cond-name{font-size:15px;font-weight:700;color:#E65100}
/* CRITICIDAD */
.crit-btns{display:flex;gap:8px;margin-top:6px}
.crit-btn{flex:1;padding:10px 6px;border:1.5px solid #DDD;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#666;text-align:center;line-height:1.3}
.crit-btn.inmediata.active{background:#FFEBEE;border-color:#C62828;color:#B71C1C}
.crit-btn.moderada.active{background:#FFF8E1;border-color:#F57F17;color:#E65100}
.crit-btn.baja.active{background:#E8F5E9;border-color:#2E7D32;color:#1B5E20}
/* FOTO */
.foto-wrap{margin-top:10px}
.foto-input-label{display:flex;align-items:center;justify-content:center;gap:8px;background:#FFF3E0;border:1.5px dashed #E65100;border-radius:10px;padding:14px;cursor:pointer;font-size:14px;color:#E65100;font-weight:500}
.foto-preview{width:100%;border-radius:10px;margin-top:8px;object-fit:cover;max-height:200px;display:none}
.foto-preview.visible{display:block}
.foto-del{width:100%;padding:8px;border:1.5px solid #EF5350;border-radius:8px;background:#fff;color:#EF5350;font-size:13px;cursor:pointer;margin-top:6px;display:none}
.foto-del.visible{display:block}
/* INFORME */
.inf-section{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #E8E8E8}
.inf-section h3{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #F0F0F0;padding-bottom:8px;margin-bottom:10px}
.inf-row{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;font-size:14px;border-bottom:1px solid #F8F8F8}
.inf-row:last-child{border-bottom:none}
.inf-row .ik{color:#555;flex:1;padding-right:8px;line-height:1.4}
.inf-row .iv{font-weight:600;color:#1a1a1a;text-align:right;max-width:55%}
.crit-badge{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
.crit-badge.inmediata{background:#FFEBEE;color:#B71C1C}
.crit-badge.moderada{background:#FFF8E1;color:#E65100}
.crit-badge.baja{background:#E8F5E9;color:#1B5E20}
</style>
</head>
<body>
<div class="topbar">
  <h1>⚠️ Condiciones Inseguras</h1>
  <span>Relevamiento y plan de acción</span>
</div>

<!-- S1: DATOS -->
<div id="s1" class="screen active">
  <div class="card" style="margin-top:12px">
    <div class="ct">📋 Datos del relevamiento</div>
    <label class="fl">Empresa / establecimiento <span class="req">*</span></label>
    <input type="text" id="empresa" placeholder="Razón social">
    <label class="fl">Sector / área <span class="req">*</span></label>
    <input type="text" id="sector" placeholder="Ej: Planta de producción, Depósito, Taller">
    <label class="fl">Fecha <span class="req">*</span></label>
    <input type="date" id="fecha">
    <label class="fl">Relevado por</label>
    <input type="text" id="relevador" placeholder="Nombre y apellido">
    <label class="fl">Matrícula</label>
    <input type="text" id="matricula" placeholder="Nº de matrícula">
  </div>
  <button class="btn-main" onclick="goS2()">Continuar → Condiciones ›</button>
</div>

<!-- S2: CONDICIONES -->
<div id="s2" class="screen">
  <div class="nota naranja" style="margin-top:12px">
    Registrá cada condición insegura detectada por separado. Podés agregar una foto directamente desde la cámara.
  </div>
  <div id="cond-container"></div>
  <button class="btn-add" onclick="addCondicion()">+ Agregar condición insegura</button>
  <button class="btn-main" onclick="goInforme()" style="margin-top:16px">📄 Ver reporte ›</button>
  <button class="btn-sec" onclick="showScreen('s1')">‹ Volver</button>
</div>

<!-- S3: INFORME -->
<div id="s3" class="screen">
  <div style="background:#E65100;color:#fff;border-radius:13px;padding:15px;margin-top:12px;margin-bottom:14px">
    <div style="font-size:15px;font-weight:700">Reporte de Condiciones Inseguras</div>
    <div style="font-size:12px;opacity:.8;margin-top:2px">Relevamiento y plan de acción</div>
    <div style="font-size:13px;margin-top:6px;opacity:.9" id="inf-sub"></div>
  </div>
  <div id="informe-body"></div>
  <button class="btn-pdf" onclick="generarPDF()">📄 Generar PDF con fotos</button>
  <button style="width:100%;padding:13px;background:#E65100;color:#fff;border:none;border-radius:13px;font-size:15px;cursor:pointer;margin-top:8px" onclick="nuevoRelevamiento()">🔄 Nuevo relevamiento</button>
</div>

<script>
const TIPOS_RIESGO = [
  'Locativo (piso, techo, estructura)',
  'Eléctrico',
  'Incendio / explosión',
  'Caída de personas',
  'Caída de objetos',
  'Atrapamiento / aplastamiento',
  'Contacto con sustancias químicas',
  'Ergonómico',
  'Orden y limpieza',
  'EPP faltante o inadecuado',
  'Señalización faltante',
  'Otro',
];

let condiciones = [];

function init(){
  document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
  addCondicion();
}

function esc(s){return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function goS2(){
  const emp=document.getElementById('empresa').value.trim();
  const sec=document.getElementById('sector').value.trim();
  const fec=document.getElementById('fecha').value;
  if(!emp||!sec||!fec){alert('Completá empresa, sector y fecha.');return;}
  showScreen('s2');
}

function addCondicion(){
  condiciones.push({
    descripcion:'',sector:'',tipo:'',criticidad:'',
    responsable:'',fechaLimite:'',
    fotoData:null,fotoName:''
  });
  renderCondiciones();
}

function removeCondicion(idx){
  if(condiciones.length<=1){alert('Debe haber al menos una condición.');return;}
  if(!confirm('¿Eliminar esta condición?'))return;
  condiciones.splice(idx,1);
  renderCondiciones();
}

function renderCondiciones(){
  const cont=document.getElementById('cond-container');
  cont.innerHTML='';
  condiciones.forEach((c,idx)=>{
    const div=document.createElement('div');
    div.className='cond-card';
    let tipoOpts=TIPOS_RIESGO.map(t=>`<option value="${t}" ${c.tipo===t?'selected':''}>${t}</option>`).join('');
    const hasFoto=!!c.fotoData;
    div.innerHTML=`
      <div class="cond-header">
        <div class="cond-name" id="cond-name-${idx}">Condición ${idx+1}${c.descripcion?' — '+c.descripcion.substring(0,20)+'…':''}</div>
        ${condiciones.length>1?`<button class="btn-sm danger" onclick="removeCondicion(${idx})">✕</button>`:''}
      </div>
      <label class="fl" style="margin-top:0">Descripción de la condición insegura</label>
      <textarea id="cond-desc-${idx}" placeholder="Describí detalladamente qué se observó..."
        oninput="condiciones[${idx}].descripcion=this.value;document.getElementById('cond-name-${idx}').textContent='Condición ${idx+1}'+(this.value?' — '+this.value.substring(0,20)+'…':'')">${esc(c.descripcion)}</textarea>
      <label class="fl">Sector / ubicación exacta</label>
      <input type="text" value="${esc(c.sector)}" placeholder="Ej: Pasillo norte, Sector soldadura, Tablero 3"
        oninput="condiciones[${idx}].sector=this.value">
      <label class="fl">Tipo de riesgo</label>
      <select onchange="condiciones[${idx}].tipo=this.value">
        <option value="">— Seleccionar tipo —</option>${tipoOpts}
      </select>
      <label class="fl">Criticidad</label>
      <div class="crit-btns">
        <button class="crit-btn inmediata ${c.criticidad==='inmediata'?'active':''}" onclick="setCrit(${idx},'inmediata')">Inmediata</button>
        <button class="crit-btn moderada ${c.criticidad==='moderada'?'active':''}" onclick="setCrit(${idx},'moderada')">Moderada</button>
        <button class="crit-btn baja ${c.criticidad==='baja'?'active':''}" onclick="setCrit(${idx},'baja')">Baja</button>
      </div>
      <div class="field-2" style="margin-top:10px">
        <div><label class="fl" style="margin-top:0">Responsable de corrección</label>
          <input type="text" value="${esc(c.responsable)}" placeholder="Nombre o área"
            oninput="condiciones[${idx}].responsable=this.value"></div>
        <div><label class="fl" style="margin-top:0">Fecha límite</label>
          <input type="date" value="${c.fechaLimite}" oninput="condiciones[${idx}].fechaLimite=this.value"></div>
      </div>
      <div class="foto-wrap">
        <label class="fl">Foto de evidencia</label>
        <label class="foto-input-label" for="foto-input-${idx}">
          Camara: ${hasFoto?'Cambiar foto':'Tomar o subir foto'}
        </label>
        <input type="file" id="foto-input-${idx}" accept="image/*" capture="environment"
          style="display:none" onchange="handleFoto(${idx},this)">
        <img id="foto-preview-${idx}" class="foto-preview ${hasFoto?'visible':''}"
          src="${c.fotoData||''}" alt="Foto condición">
        <button id="foto-del-${idx}" class="foto-del ${hasFoto?'visible':''}"
          onclick="deleteFoto(${idx})">Eliminar foto</button>
      </div>
    `;
    cont.appendChild(div);
  });
}

function setCrit(idx,val){
  condiciones[idx].criticidad=val;
  renderCondiciones();
}

function handleFoto(idx,input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    // Corregir orientación EXIF usando canvas
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      // Usar dimensiones originales (el browser ya aplica EXIF al renderizar)
      canvas.width=img.naturalWidth;
      canvas.height=img.naturalHeight;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0);
      // Guardar como JPEG con calidad reducida para no pesar demasiado
      const corrected=canvas.toDataURL('image/jpeg',0.7);
      condiciones[idx].fotoData=corrected;
      condiciones[idx].fotoName=file.name;
      renderCondiciones();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function deleteFoto(idx){
  condiciones[idx].fotoData=null;
  condiciones[idx].fotoName='';
  renderCondiciones();
}

function goInforme(){
  const empresa=document.getElementById('empresa').value||'—';
  const fecha=document.getElementById('fecha').value;
  const dateStr=fecha?new Date(fecha+'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'}):'—';
  document.getElementById('inf-sub').textContent=empresa+' · '+dateStr;
  const inm=condiciones.filter(c=>c.criticidad==='inmediata').length;
  const mod=condiciones.filter(c=>c.criticidad==='moderada').length;
  const baj=condiciones.filter(c=>c.criticidad==='baja').length;
  let body=`<div class="inf-section"><h3>Datos del relevamiento</h3>
    ${ir('Empresa',empresa)}${ir('Sector',document.getElementById('sector').value)}
    ${ir('Fecha',dateStr)}${ir('Relevado por',document.getElementById('relevador').value+(document.getElementById('matricula').value?' (Mat. '+document.getElementById('matricula').value+')':''))}
    ${ir('Total condiciones',condiciones.length)}
    ${ir('🔴 Criticidad inmediata',inm)}${ir('🟡 Criticidad moderada',mod)}${ir('🟢 Criticidad baja',baj)}
  </div>`;
  condiciones.forEach((c,i)=>{
    body+=`<div class="inf-section"><h3>⚠️ Condición ${i+1}</h3>
      ${ir('Descripción',c.descripcion||'—')}
      ${ir('Sector / ubicación',c.sector||'—')}
      ${ir('Tipo de riesgo',c.tipo||'—')}
      ${ir('Criticidad',c.criticidad?`<span class="crit-badge ${c.criticidad}">${c.criticidad==='inmediata'?'🔴 INMEDIATA':c.criticidad==='moderada'?'🟡 MODERADA':'🟢 BAJA'}</span>`:'—')}
      ${ir('Responsable corrección',c.responsable||'—')}
      ${ir('Fecha límite',c.fechaLimite||'—')}
      ${c.fotoData?`<div style="margin-top:10px"><img src="${c.fotoData}" style="width:100%;border-radius:10px;max-height:200px;object-fit:cover"></div>`:''}
    </div>`;
  });
  document.getElementById('informe-body').innerHTML=body;
  showScreen('s3');
}

function ir(k,v){return `<div class="inf-row"><span class="ik">${k}</span><span class="iv">${v||'—'}</span></div>`;}

function generarPDF(){
  const{jsPDF}=window.jspdf;
  if(!jsPDF){alert('Error cargando jsPDF');return;}
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,M=15;let y=15;
  const naranja=[230,81,0],gris=[245,247,250],negro=[30,30,30],rojof=[198,40,40],amarillo=[245,127,23],verdeb=[46,125,50];
  function sf(s,sz,c){doc.setFont('helvetica',s);doc.setFontSize(sz);doc.setTextColor(...(c||negro));}
  // Header
  doc.setFillColor(...naranja);doc.rect(0,0,W,22,'F');
  sf('bold',13,[255,255,255]);doc.text('REPORTE DE CONDICIONES INSEGURAS',M,10);
  sf('normal',8,[255,200,150]);doc.text('Relevamiento y plan de accion — S&E Consultores',M,16);
  y=28;
  const fecha=document.getElementById('fecha').value;
  const dateStr=fecha?new Date(fecha+'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'}):'—';
  doc.setFillColor(...gris);doc.roundedRect(M,y,W-M*2,24,2,2,'F');
  sf('bold',9,naranja);doc.text('DATOS DEL RELEVAMIENTO',M+4,y+6);sf('normal',8.5,negro);
  doc.text('Empresa: ',M+4,y+13);sf('bold',8.5,negro);doc.text(document.getElementById('empresa').value||'—',M+22,y+13);
  sf('normal',8.5,negro);
  doc.text('Sector: '+(document.getElementById('sector').value||'—'),M+4,y+19);
  doc.text('Fecha: '+dateStr,M+80,y+13);
  doc.text('Relevado por: '+(document.getElementById('relevador').value||'—')+(document.getElementById('matricula').value?' (Mat. '+document.getElementById('matricula').value+')':''),M+80,y+19);
  const inm=condiciones.filter(c=>c.criticidad==='inmediata').length;
  const mod=condiciones.filter(c=>c.criticidad==='moderada').length;
  const baj=condiciones.filter(c=>c.criticidad==='baja').length;
  doc.text(`Total: ${condiciones.length} condiciones  ·  Inmediatas: ${inm}  ·  Moderadas: ${mod}  ·  Bajas: ${baj}`,M+4,y+23);
  y+=30;
  condiciones.forEach((c,i)=>{
    if(y>230&&!c.fotoData){doc.addPage();y=15;}
    else if(y>180&&c.fotoData){doc.addPage();y=15;}
    // Header condicion
    const critColor=c.criticidad==='inmediata'?rojof:c.criticidad==='moderada'?amarillo:verdeb;
    doc.setFillColor(...critColor);doc.rect(M,y,W-M*2,8,'F');
    sf('bold',9,[255,255,255]);
    const critLabel=c.criticidad==='inmediata'?'[!] INMEDIATA':c.criticidad==='moderada'?'[~] MODERADA':'[OK] BAJA';
    doc.text(`CONDICION ${i+1}  |  ${critLabel}`,M+4,y+5.5);y+=10;
    // Datos
    doc.setFillColor(250,250,250);doc.roundedRect(M,y,W-M*2,c.fotoData?0:0,0,0,'F');
    sf('normal',8.5,negro);
    const descLines=doc.splitTextToSize(c.descripcion||'Sin descripción',W-M*2-8);
    const descH=descLines.length*4.5+4;
    doc.setFillColor(250,248,245);doc.rect(M,y,W-M*2,descH,'F');
    sf('bold',8,[230,81,0]);doc.text('Descripción:',M+4,y+4.5);
    sf('normal',8,negro);doc.text(descLines,M+4,y+9);y+=descH+2;
    doc.setFillColor(250,250,250);doc.rect(M,y,W-M*2,14,'F');
    sf('normal',8,negro);
    doc.text('Sector: '+(c.sector||'—'),M+4,y+5);
    doc.text('Tipo riesgo: '+(c.tipo||'—'),M+4,y+10);
    doc.text('Responsable: '+(c.responsable||'—'),M+80,y+5);
    doc.text('Fecha límite: '+(c.fechaLimite||'—'),M+80,y+10);
    y+=16;
    // Foto
    if(c.fotoData){
      if(y>230){doc.addPage();y=15;}
      try{
        const imgH=60;
        doc.addImage(c.fotoData,'JPEG',M,y,W-M*2,imgH);
        y+=imgH+4;
      }catch(e){
        sf('normal',8,[150,150,150]);doc.text('[Foto no disponible en PDF]',M+4,y+5);y+=10;
      }
    }
    y+=4;
    doc.setDrawColor(220,220,220);doc.line(M,y,W-M,y);y+=4;
  });
  y+=4;sf('normal',7,[150,150,150]);
  doc.text('Generado con App PROTOKOL - By S&E Consultores · syeconsultores.com.ar',W/2,y,{align:'center'});
  try {
    const pdfBlob=doc.output('blob');
    const blobUrl=URL.createObjectURL(pdfBlob);
    window.open(blobUrl,'_blank');
  } catch(e) {
    const nombre='Condiciones_Inseguras_'+(document.getElementById('empresa').value||'empresa').replace(/\s+/g,'_')+'_'+(fecha||'sin_fecha')+'.pdf';
    doc.save(nombre);
  }
}

function nuevoRelevamiento(){
  if(!confirm('¿Nuevo relevamiento? Se perderán los datos actuales.'))return;
  condiciones=[];
  document.querySelectorAll('input[type=text],input[type=date],textarea').forEach(el=>el.value='');
  document.querySelectorAll('select').forEach(el=>el.selectedIndex=0);
  document.getElementById('fecha').value=new Date().toISOString().split('T')[0];
  addCondicion();showScreen('s1');
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

init();
</script>
</body>
</html>
